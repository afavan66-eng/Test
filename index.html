<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Sorgu Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .sidebar { transition: all 0.3s ease; width: 260px; height: 100vh; position: fixed; left: 0; top: 0; }
        .sidebar.closed { transform: translateX(-260px); }
        .main-content { transition: all 0.3s ease; margin-left: 260px; }
        .main-content.expanded { margin-left: 0; }
        .card { background: #1e293b; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .api-btn { transition: 0.2s; border-left: 4px solid transparent; }
        .api-btn:hover, .api-btn.active { background: #334155; border-left-color: #38bdf8; color: white; }
        pre { white-space: pre-wrap; word-wrap: break-word; scrollbar-width: thin; }
        @media (max-width: 1024px) {
            .sidebar { z-index: 100; }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body class="flex overflow-hidden">

    <aside id="sidebar" class="sidebar bg-slate-900 flex flex-col shadow-2xl border-r border-slate-800">
        <div class="p-6 text-2xl font-black text-sky-400 border-b border-slate-800 flex justify-between items-center">
            <span>VIP PANEL</span>
            <button onclick="toggleSidebar()" class="lg:hidden text-white"><i class="fas fa-times"></i></button>
        </div>
        
        <nav class="flex-1 overflow-y-auto py-4">
            <p class="px-6 text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Sorgu Listesi</p>
            <div id="menu-items" class="space-y-1">
                </div>
        </nav>
    </aside>

    <main id="main-content" class="main-content flex-1 flex flex-col min-w-0 min-h-screen">
        <header class="h-16 bg-slate-800/50 backdrop-blur-md flex items-center px-6 sticky top-0 z-40 border-b border-slate-700 justify-between">
            <button onclick="toggleSidebar()" class="text-xl p-2 hover:bg-slate-700 rounded-full transition">
                <i class="fas fa-bars text-sky-400"></i>
            </button>
            <div class="flex items-center gap-4 text-sm font-medium">
                <i class="fas fa-user-shield text-sky-500"></i>
                <span>Oturum: <span class="text-sky-400 font-bold">Admin</span></span>
            </div>
        </header>

        <div class="p-4 md:p-8 overflow-y-auto">
            <div class="max-w-5xl mx-auto">
                <h2 id="current-title" class="text-4xl font-extrabold mb-8 text-white tracking-tight">Lütfen Menüden Seçim Yapın</h2>
                
                <div id="query-card" class="card p-8 rounded-2xl mb-8 hidden">
                    <div id="input-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        </div>
                    <button onclick="executeSearch()" class="mt-8 w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-sky-900/20 transition-all transform active:scale-95">
                        <i class="fas fa-bolt mr-2"></i> SORGULA
                    </button>
                </div>

                <div id="result-area" class="card p-8 rounded-2xl hidden animate-pulse-once">
                    <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
                        <h3 class="text-xl font-bold text-sky-400"><i class="fas fa-terminal mr-2"></i>Sorgu Sonucu</h3>
                        <button onclick="copyResults()" class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded">Kopyala</button>
                    </div>
                    <pre id="json-output" class="text-green-400 font-mono text-sm bg-black/40 p-6 rounded-xl border border-slate-800"></pre>
                </div>
            </div>
        </div>
    </main>

    <script>
        // API Yapılandırması
        const apiConfig = [
            { id: 'tc', name: 'TC Sorgu', url: 'https://punisherapi.alwaysdata.net/apiservices/tc.php', params: ['tc'] },
            { id: 'tcpro', name: 'TC Pro', url: 'https://punisherapi.alwaysdata.net/apiservices/tcpro.php', params: ['tc'] },
            { id: 'adsoyad', name: 'Ad Soyad', url: 'https://punisherapi.alwaysdata.net/apiservices/adsoyad.php', params: ['ad', 'soyad'] },
            { id: 'adsoyadpro', name: 'Ad Soyad Pro', url: 'https://punisherapi.alwaysdata.net/apiservices/adsoyadpro.php', params: ['ad', 'soyad'] },
            { id: 'aile', name: 'Aile Sorgu', url: 'https://punisherapi.alwaysdata.net/apiservices/aile.php', params: ['tc'] },
            { id: 'adres', name: 'Adres Sorgu', url: 'https://punisherapi.alwaysdata.net/apiservices/adres.php', params: ['tc'] },
            { id: 'adililce', name: 'Ad İl İlçe', url: 'https://punisherapi.alwaysdata.net/apiservices/adililce.php', params: ['ad', 'il', 'ilce'] },
            { id: 'sulale', name: 'Sülale Sorgu', url: 'https://punisherapi.alwaysdata.net/apiservices/sulale.php', params: ['tc'] },
            { id: 'isyeri', name: 'İşyeri Sorgu', url: 'https://punisherapi.alwaysdata.net/apiservices/isyeri.php', params: ['tc'] },
            { id: 'iban', name: 'IBAN Sorgu', url: 'https://punisherapi.alwaysdata.net/apiservices/iban.php', params: ['iban'] },
            { id: 'gsm', name: 'GSM den TC', url: 'https://punisherapi.alwaysdata.net/apiservices/gsmtc.php', params: ['gsm'] },
            { id: 'tcgsm', name: 'TC den GSM', url: 'https://punisherapi.alwaysdata.net/apiservices/tcgsm.php', params: ['tc'] }
        ];

        let selectedApi = null;

        // Menüyü Dinamik Oluştur
        const menuContainer = document.getElementById('menu-items');
        apiConfig.forEach(api => {
            const btn = document.createElement('button');
            btn.className = 'api-btn w-full text-left px-6 py-3.5 flex items-center gap-4 text-slate-400 font-medium';
            btn.innerHTML = `<i class="fas fa-search-plus text-sm"></i> <span>${api.name}</span>`;
            btn.onclick = () => selectApi(api, btn);
            menuContainer.appendChild(btn);
        });

        function selectApi(api, element) {
            selectedApi = api;
            // Aktif buton görseli
            document.querySelectorAll('.api-btn').forEach(b => b.classList.remove('active', 'text-white'));
            element.classList.add('active', 'text-white');
            
            // Paneli güncelle
            document.getElementById('current-title').innerText = api.name;
            document.getElementById('query-card').classList.remove('hidden');
            const inputContainer = document.getElementById('input-container');
            inputContainer.innerHTML = '';
            
            api.params.forEach(param => {
                inputContainer.innerHTML += `
                    <div class="space-y-2">
                        <label class="block text-sm font-bold text-slate-300 uppercase">${param}</label>
                        <input type="text" id="input-${param}" placeholder="${param} giriniz..." 
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-5 py-3 focus:ring-2 focus:ring-sky-500 focus:border-transparent outline-none transition-all">
                    </div>
                `;
            });
            document.getElementById('result-area').classList.add('hidden');
        }

        async function executeSearch() {
            if (!selectedApi) return;
            
            const btn = event.currentTarget;
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> VERİLER ÇEKİLİYOR...';
            btn.disabled = true;
            
            let queryParams = new URLSearchParams();
            selectedApi.params.forEach(p => {
                const val = document.getElementById(`input-${p}`).value;
                if(val) queryParams.append(p, val);
            });

            try {
                // Not: API URL'si parametreleri bekliyor
                const response = await fetch(`${selectedApi.url}?${queryParams.toString()}`);
                const data = await response.json();
                
                document.getElementById('result-area').classList.remove('hidden');
                document.getElementById('json-output').innerText = JSON.stringify(data, null, 4);
                
                // Mobilde otomatik aşağı kaydır
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

            } catch (error) {
                alert('API Hatası: Veri çekilemedi veya bağlantı reddedildi.');
                console.error('Hata:', error);
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('closed');
            document.getElementById('main-content').classList.toggle('expanded');
        }

        function copyResults() {
            const text = document.getElementById('json-output').innerText;
            navigator.clipboard.writeText(text);
            alert('Sonuçlar panoya kopyalandı!');
        }
    </script>
</body>
</html>
